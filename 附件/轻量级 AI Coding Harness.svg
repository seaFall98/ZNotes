<svg width="760" height="540" viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">普通团队最小 AI Coding Harness</title>
  <desc id="desc">用 spec、progress、review checklist、test evidence、completion report 和 regression cases 构成最小 AI Coding Harness。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker><style>.title{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.h{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.t{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.code{font:600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#111827}.box{stroke:#111827;stroke-width:1.35}.line{stroke:#111827;stroke-width:2;marker-end:url(#arrow)}</style></defs>
  <rect width="760" height="540" fill="#fff"/>
  <text x="380" y="36" text-anchor="middle" class="title">普通团队最小 AI Coding Harness</text>
  <text x="380" y="60" text-anchor="middle" class="sub">不追求平台化，先让 AI 的每次完成都留下证据</text>

  <rect x="70" y="95" width="210" height="70" rx="16" fill="#EEF2FF" class="box"/>
  <text x="175" y="122" text-anchor="middle" class="code">spec.md</text>
  <text x="175" y="145" text-anchor="middle" class="t">目标 · 边界 · 验收标准</text>

  <rect x="480" y="95" width="210" height="70" rx="16" fill="#ECFDF5" class="box"/>
  <text x="585" y="122" text-anchor="middle" class="code">progress.md</text>
  <text x="585" y="145" text-anchor="middle" class="t">状态 · 阻塞 · 下一步</text>

  <rect x="70" y="225" width="210" height="70" rx="16" fill="#F3F4F6" class="box"/>
  <text x="175" y="252" text-anchor="middle" class="code">review-checklist.md</text>
  <text x="175" y="275" text-anchor="middle" class="t">假完成 · 越界 · 测试缺失</text>

  <rect x="480" y="225" width="210" height="70" rx="16" fill="#FEF3C7" class="box"/>
  <text x="585" y="252" text-anchor="middle" class="code">test evidence</text>
  <text x="585" y="275" text-anchor="middle" class="t">build · test · lint · logs</text>

  <rect x="70" y="355" width="210" height="70" rx="16" fill="#E0F2FE" class="box"/>
  <text x="175" y="382" text-anchor="middle" class="code">completion-report.md</text>
  <text x="175" y="405" text-anchor="middle" class="t">改动说明 · 命令输出 · 未完成项</text>

  <rect x="480" y="355" width="210" height="70" rx="16" fill="#FEE2E2" class="box"/>
  <text x="585" y="382" text-anchor="middle" class="code">regression-cases.md</text>
  <text x="585" y="405" text-anchor="middle" class="t">事故复盘 · 新规则 · 回归用例</text>

  <line x1="280" y1="130" x2="480" y2="130" class="line"/>
  <line x1="585" y1="165" x2="585" y2="225" class="line"/>
  <line x1="480" y1="260" x2="280" y2="260" class="line"/>
  <line x1="175" y1="295" x2="175" y2="355" class="line"/>
  <line x1="280" y1="390" x2="480" y2="390" class="line"/>
  <path d="M585 425 C585 485 175 485 175 425" fill="none" stroke="#111827" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow)"/>

  <rect x="215" y="190" width="330" height="50" rx="16" fill="#111827"/>
  <text x="380" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">核心原则</text>
  <text x="380" y="232" text-anchor="middle" font-size="12" fill="#D1D5DB">不要只问“AI 说完成了吗”，要问“证据在哪里”</text>

  <text x="380" y="510" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">事故 → 复盘 → 规则 → 检查 → 回归：让每次翻车都变成下一轮约束</text>
</svg>
