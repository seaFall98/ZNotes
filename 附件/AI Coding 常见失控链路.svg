<svg width="760" height="460" viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Coding 常见失控链路</title>
  <desc id="desc">从模糊需求到假完成，再到错误状态继续传播的 AI Coding 失控链路。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
    <style>.title{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.h{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.t{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.box{stroke:#111827;stroke-width:1.3}.line{stroke:#111827;stroke-width:2;marker-end:url(#arrow)}.dash{stroke:#991B1B;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow);fill:none}</style>
  </defs>
  <rect width="760" height="460" fill="#fff"/>
  <text x="380" y="36" text-anchor="middle" class="title">AI Coding 常见失控链路</text>
  <text x="380" y="60" text-anchor="middle" class="sub">风险不在于 AI 不写代码，而在于“看似完成但不可验证”</text>

  <rect x="38" y="105" width="128" height="74" rx="14" fill="#EEF2FF" class="box"/>
  <text x="102" y="134" text-anchor="middle" class="h">模糊需求</text><text x="102" y="156" text-anchor="middle" class="t">边界不清</text>
  <rect x="190" y="105" width="128" height="74" rx="14" fill="#F9FAFB" class="box"/>
  <text x="254" y="134" text-anchor="middle" class="h">局部生成</text><text x="254" y="156" text-anchor="middle" class="t">看似合理</text>
  <rect x="342" y="105" width="128" height="74" rx="14" fill="#FEF3C7" class="box"/>
  <text x="406" y="134" text-anchor="middle" class="h">缺少验证</text><text x="406" y="156" text-anchor="middle" class="t">未真实跑通</text>
  <rect x="494" y="105" width="128" height="74" rx="14" fill="#FEE2E2" class="box"/>
  <text x="558" y="134" text-anchor="middle" class="h">总结完成</text><text x="558" y="156" text-anchor="middle" class="t">表达大于事实</text>
  <rect x="646" y="105" width="76" height="74" rx="14" fill="#FECACA" class="box"/>
  <text x="684" y="134" text-anchor="middle" class="h">状态</text><text x="684" y="156" text-anchor="middle" class="t">污染</text>

  <line x1="166" y1="142" x2="190" y2="142" class="line"/><line x1="318" y1="142" x2="342" y2="142" class="line"/><line x1="470" y1="142" x2="494" y2="142" class="line"/><line x1="622" y1="142" x2="646" y2="142" class="line"/>

  <rect x="82" y="245" width="596" height="128" rx="20" fill="#F9FAFB" stroke="#111827" stroke-width="1.5"/>
  <text x="380" y="280" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">典型表现</text>
  <text x="380" y="310" text-anchor="middle" class="t">mock / stub 冒充真实实现 · 只改局部没有接入调用链 · 没跑测试却声称通过</text>
  <text x="380" y="338" text-anchor="middle" class="t">文档和代码状态不一致 · 长任务边界漂移 · 多 Agent 传递错误总结</text>
  <text x="380" y="366" text-anchor="middle" class="t">输出看起来完整，但缺少可验证证据</text>

  <path d="M684 180 C690 220 650 225 610 245" class="dash"/>
  <rect x="205" y="405" width="350" height="38" rx="12" fill="#111827"/>
  <text x="380" y="429" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">缺少 Harness：错误状态会继续向后传播</text>
</svg>
