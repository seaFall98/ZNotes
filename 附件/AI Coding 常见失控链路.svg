<svg width="760" height="430" viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="760" height="430" fill="#ffffff"/>
  <text x="380" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">AI Coding 常见失控链路</text>

  <rect x="60" y="80" width="160" height="60" rx="14" fill="#EEF2FF" stroke="#111827"/>
  <text x="140" y="106" text-anchor="middle" font-size="14" font-weight="700">模糊需求</text>
  <text x="140" y="126" text-anchor="middle" font-size="12" fill="#4B5563">边界不清</text>

  <rect x="300" y="80" width="160" height="60" rx="14" fill="#F9FAFB" stroke="#111827"/>
  <text x="380" y="106" text-anchor="middle" font-size="14" font-weight="700">AI 执行</text>
  <text x="380" y="126" text-anchor="middle" font-size="12" fill="#4B5563">局部看似合理</text>

  <rect x="540" y="80" width="160" height="60" rx="14" fill="#FEF2F2" stroke="#111827"/>
  <text x="620" y="106" text-anchor="middle" font-size="14" font-weight="700">假完成</text>
  <text x="620" y="126" text-anchor="middle" font-size="12" fill="#4B5563">总结大于事实</text>

  <line x1="220" y1="110" x2="300" y2="110" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="110" x2="540" y2="110" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="210" width="560" height="140" rx="18" fill="#F9FAFB" stroke="#111827" stroke-width="1.5"/>
  <text x="380" y="242" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">典型表现</text>
  <text x="380" y="272" text-anchor="middle" font-size="13" fill="#374151">mock 冒充真实实现 · 没跑测试却声称验证 · 文档和代码不一致</text>
  <text x="380" y="300" text-anchor="middle" font-size="13" fill="#374151">长任务漂移 · 改动范围失控 · 多 Agent 传递错误事实</text>
  <text x="380" y="328" text-anchor="middle" font-size="13" fill="#374151">输出看起来完整，但缺少可验证证据</text>

  <rect x="210" y="375" width="340" height="36" rx="10" fill="#111827"/>
  <text x="380" y="398" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">问题不只是 Prompt，而是缺少 Harness</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
  </defs>
</svg>
