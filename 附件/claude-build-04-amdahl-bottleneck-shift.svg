<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Amdahl 定律瓶颈迁移图</title>
  <desc id="desc">展示 AI 加速一个环节后，瓶颈迁移到下一个未被加速环节。</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.sub{font:400 22px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#475569}.cardTitle{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.label{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#475569}.bottleneck{font:800 25px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#dc2626}.quote{font:700 27px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.small{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#ffffff}.speed{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.block{fill:#fff1f2;stroke:#dc2626;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1200" height="700" rx="28"/>
  <text class="title" x="70" y="64">Amdahl 定律：瓶颈会迁移</text>
  <text class="sub" x="70" y="102">AI 加速一个环节后，系统压力会转移到下一个薄弱环节</text>

  <g transform="translate(70 150)">
    <rect class="speed" x="0" y="0" width="330" height="92" rx="18"/>
    <text class="label" x="28" y="32">AI 加速项</text>
    <text class="cardTitle" x="28" y="66">代码生成加速</text>
    <line x1="350" y1="46" x2="475" y2="46" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect class="block" x="500" y="0" width="420" height="92" rx="18"/>
    <path d="M535 18 L565 18 L565 74 L535 74 M885 18 L855 18 L855 74 L885 74" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
    <text class="label" x="590" y="32">新瓶颈</text>
    <text class="bottleneck" x="590" y="66">Review 堵塞</text>
  </g>

  <g transform="translate(70 270)">
    <rect class="speed" x="0" y="0" width="330" height="92" rx="18"/>
    <text class="label" x="28" y="32">AI 加速项</text>
    <text class="cardTitle" x="28" y="66">实验加速</text>
    <line x1="350" y1="46" x2="475" y2="46" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect class="block" x="500" y="0" width="420" height="92" rx="18"/>
    <path d="M535 18 L565 18 L565 74 L535 74 M885 18 L855 18 L855 74 L885 74" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
    <text class="label" x="590" y="32">新瓶颈</text>
    <text class="bottleneck" x="590" y="66">结果判断堵塞</text>
  </g>

  <g transform="translate(70 390)">
    <rect class="speed" x="0" y="0" width="330" height="92" rx="18"/>
    <text class="label" x="28" y="32">AI 加速项</text>
    <text class="cardTitle" x="28" y="66">文档加速</text>
    <line x1="350" y1="46" x2="475" y2="46" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect class="block" x="500" y="0" width="420" height="92" rx="18"/>
    <path d="M535 18 L565 18 L565 74 L535 74 M885 18 L855 18 L855 74 L885 74" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
    <text class="label" x="590" y="32">新瓶颈</text>
    <text class="bottleneck" x="590" y="66">上下文污染</text>
  </g>

  <g transform="translate(70 510)">
    <rect class="speed" x="0" y="0" width="330" height="92" rx="18"/>
    <text class="label" x="28" y="32">AI 加速项</text>
    <text class="cardTitle" x="28" y="66">Agent 加速</text>
    <line x1="350" y1="46" x2="475" y2="46" stroke="#2563eb" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
    <rect class="block" x="500" y="0" width="420" height="92" rx="18"/>
    <path d="M535 18 L565 18 L565 74 L535 74 M885 18 L855 18 L855 74 L885 74" fill="none" stroke="#dc2626" stroke-width="7" stroke-linecap="round"/>
    <text class="label" x="590" y="32">新瓶颈</text>
    <text class="bottleneck" x="590" y="66">权限与治理风险</text>
  </g>

  <g transform="translate(1010 198)">
    <circle cx="42" cy="42" r="42" fill="#dc2626"/>
    <text class="small" x="42" y="37" text-anchor="middle">堵塞</text>
    <text class="small" x="42" y="60" text-anchor="middle">迁移</text>
    <path d="M42 105 C-5 180 90 250 42 325" fill="none" stroke="#dc2626" stroke-width="5" stroke-dasharray="8 8"/>
  </g>

  <rect x="90" y="626" width="1020" height="48" rx="16" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text class="quote" x="600" y="658" text-anchor="middle">AI 不会自然让团队快 8 倍，它只会更快暴露真正的瓶颈。</text>
</svg>
