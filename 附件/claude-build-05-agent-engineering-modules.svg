<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent 工程五模块图</title>
  <desc id="desc">展示围绕 AI 执行过程建立控制系统的七段式闭环。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.sub{font:400 22px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#475569}.module{font:800 25px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.exModule{font:800 27px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#ffffff}.desc{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#475569}.exDesc{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#ffffff}.note{font:700 26px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.small{font:400 21px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#475569}.card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}.control{fill:#eff6ff;stroke:#2563eb;stroke-width:2}.execution{fill:#2563eb;stroke:#1d4ed8;stroke-width:3}.judge{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620" rx="28"/>
  <text class="title" x="70" y="64">Agent 工程五模块图</text>
  <text class="sub" x="70" y="102">AI Coding 关注输出；Agent 工程关注闭环。</text>

  <g transform="translate(50 210)">
    <rect class="control" x="0" y="0" width="138" height="118" rx="18"/>
    <text class="module" x="69" y="45" text-anchor="middle">Spec</text>
    <text class="desc" x="69" y="78" text-anchor="middle">任务边界</text>

    <line x1="148" y1="59" x2="190" y2="59" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <rect class="control" x="200" y="0" width="148" height="118" rx="18"/>
    <text class="module" x="274" y="45" text-anchor="middle">Context</text>
    <text class="desc" x="274" y="78" text-anchor="middle">正确上下文</text>

    <line x1="358" y1="59" x2="400" y2="59" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <rect class="control" x="410" y="0" width="150" height="118" rx="18"/>
    <text class="module" x="485" y="45" text-anchor="middle">Harness</text>
    <text class="desc" x="485" y="78" text-anchor="middle">执行约束</text>

    <line x1="570" y1="59" x2="612" y2="59" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <rect class="execution" x="622" y="-22" width="166" height="162" rx="22"/>
    <text class="exModule" x="705" y="44" text-anchor="middle">Execution</text>
    <text class="exDesc" x="705" y="80" text-anchor="middle">AI 执行</text>
    <text class="exDesc" x="705" y="111" text-anchor="middle">不是唯一重点</text>

    <line x1="798" y1="59" x2="840" y2="59" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <rect class="control" x="850" y="0" width="126" height="118" rx="18"/>
    <text class="module" x="913" y="45" text-anchor="middle">Eval</text>
    <text class="desc" x="913" y="78" text-anchor="middle">完成证据</text>

    <line x1="986" y1="59" x2="1028" y2="59" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <rect class="control" x="1038" y="0" width="132" height="118" rx="18"/>
    <text class="module" x="1104" y="45" text-anchor="middle">Review</text>
    <text class="desc" x="1104" y="78" text-anchor="middle">风险审计</text>
  </g>

  <g transform="translate(744 410)">
    <path d="M360 -82 C430 -30 430 45 360 95 L120 95 C55 92 20 55 20 10 C20 -36 55 -75 120 -82 Z" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text class="module" x="214" y="0" text-anchor="middle">Human Judgment</text>
    <text class="desc" x="214" y="36" text-anchor="middle">最终判断</text>
    <path d="M360 -22 C410 -22 420 -80 350 -145" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <path d="M1154 328 C1168 385 1116 435 1066 437" fill="none" stroke="#7c3aed" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M870 505 C620 565 270 515 120 350" fill="none" stroke="#7c3aed" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text class="small" x="430" y="526" text-anchor="middle">判断结果进入下一轮 Spec，闭环持续迭代</text>

  <rect x="125" y="145" width="950" height="42" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="small" x="600" y="173" text-anchor="middle">真正重要的不是单点代码生成，而是围绕 AI 执行建立控制系统</text>

  <rect x="158" y="560" width="884" height="38" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="note" x="600" y="587" text-anchor="middle">从“让 AI 写代码”升级为“让 AI 在可控闭环里工作”</text>
</svg>
