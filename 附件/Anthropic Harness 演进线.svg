<svg width="760" height="540" viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg">
  <rect width="760" height="540" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">Anthropic Harness 演进线</text>

  <line x1="90" y1="105" x2="670" y2="105" stroke="#111827" stroke-width="2"/>

  <g fill="#111827" font-size="12">
    <circle cx="110" cy="105" r="8" fill="#10B981"/>
    <text x="110" y="145" text-anchor="middle" font-weight="700">Effective</text>
    <text x="110" y="162" text-anchor="middle" font-weight="700">Agents</text>

    <circle cx="205" cy="105" r="8" fill="#10B981"/>
    <text x="205" y="145" text-anchor="middle" font-weight="700">Context</text>
    <text x="205" y="162" text-anchor="middle" font-weight="700">Engineering</text>

    <circle cx="300" cy="105" r="8" fill="#10B981"/>
    <text x="300" y="145" text-anchor="middle" font-weight="700">Long-running</text>
    <text x="300" y="162" text-anchor="middle" font-weight="700">Agents</text>

    <circle cx="395" cy="105" r="8" fill="#10B981"/>
    <text x="395" y="145" text-anchor="middle" font-weight="700">Planner</text>
    <text x="395" y="162" text-anchor="middle" font-weight="700">Generator</text>
    <text x="395" y="179" text-anchor="middle" font-weight="700">Evaluator</text>

    <circle cx="490" cy="105" r="8" fill="#10B981"/>
    <text x="490" y="145" text-anchor="middle" font-weight="700">Managed</text>
    <text x="490" y="162" text-anchor="middle" font-weight="700">Agents</text>

    <circle cx="585" cy="105" r="8" fill="#10B981"/>
    <text x="585" y="145" text-anchor="middle" font-weight="700">Auto</text>
    <text x="585" y="162" text-anchor="middle" font-weight="700">Mode</text>

    <circle cx="670" cy="105" r="8" fill="#10B981"/>
    <text x="670" y="145" text-anchor="middle" font-weight="700">Containment</text>
  </g>

  <rect x="95" y="250" width="570" height="200" rx="18" fill="#F9FAFB" stroke="#111827"/>
  <text x="380" y="285" text-anchor="middle" font-size="18" font-weight="700">Anthropic 路线的核心问题</text>
  <text x="380" y="325" text-anchor="middle" font-size="14" fill="#374151">长任务如何交接？</text>
  <text x="380" y="355" text-anchor="middle" font-size="14" fill="#374151">Agent 运行时如何解耦？</text>
  <text x="380" y="385" text-anchor="middle" font-size="14" fill="#374151">权限弹窗如何减少但不降低安全？</text>
  <text x="380" y="415" text-anchor="middle" font-size="14" fill="#374151">Agent 越强，如何限制 blast radius？</text>

  <text x="380" y="510" text-anchor="middle" font-size="13" fill="#4B5563">从上下文管理到运行时解耦，再到沙箱和安全边界</text>
</svg>
