<svg width="760" height="500" viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Anthropic Harness 工程问题观察</title>
  <desc id="desc">基于公开工程文章观察到的 Anthropic Harness 关注点：长任务状态外置、职责分离、运行时解耦和 Containment。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#10B981"/></marker><style>.title{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.h{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.t{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.box{stroke:#111827;stroke-width:1.35}.line{stroke:#10B981;stroke-width:2.2;marker-end:url(#arrow)}</style></defs>
  <rect width="760" height="500" fill="#fff"/>
  <text x="380" y="36" text-anchor="middle" class="title">Anthropic Harness：公开工程文章中的四个问题</text>
  <text x="380" y="60" text-anchor="middle" class="sub">不是术语时间线，而是让 Agent 可恢复、可观察、可隔离、可约束</text>

  <rect x="65" y="110" width="250" height="96" rx="18" fill="#ECFDF5" class="box"/>
  <text x="190" y="140" text-anchor="middle" class="h">长任务状态外置</text>
  <text x="190" y="166" text-anchor="middle" class="t">progress file · git history</text>
  <text x="190" y="188" text-anchor="middle" class="t">handoff · context reset</text>

  <rect x="445" y="110" width="250" height="96" rx="18" fill="#EEF2FF" class="box"/>
  <text x="570" y="140" text-anchor="middle" class="h">职责分离</text>
  <text x="570" y="166" text-anchor="middle" class="t">Planner · Generator · Evaluator</text>
  <text x="570" y="188" text-anchor="middle" class="t">避免自写自评</text>

  <rect x="65" y="285" width="250" height="96" rx="18" fill="#F3F4F6" class="box"/>
  <text x="190" y="315" text-anchor="middle" class="h">运行时解耦</text>
  <text x="190" y="341" text-anchor="middle" class="t">brain / hands 分离</text>
  <text x="190" y="363" text-anchor="middle" class="t">可恢复 · 可观察 · 可替换</text>

  <rect x="445" y="285" width="250" height="96" rx="18" fill="#FEE2E2" class="box"/>
  <text x="570" y="315" text-anchor="middle" class="h">限制爆炸半径</text>
  <text x="570" y="341" text-anchor="middle" class="t">auto mode · approval fatigue</text>
  <text x="570" y="363" text-anchor="middle" class="t">sandbox · VM · egress control</text>

  <line x1="315" y1="158" x2="445" y2="158" class="line"/><line x1="570" y1="206" x2="570" y2="285" class="line"/><line x1="445" y1="333" x2="315" y2="333" class="line"/><line x1="190" y1="285" x2="190" y2="206" class="line"/>

  <rect x="150" y="425" width="460" height="42" rx="14" fill="#111827"/>
  <text x="380" y="452" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">核心判断：不要只让 Agent 更长时间工作，要让它能被工程系统接管</text>
</svg>
