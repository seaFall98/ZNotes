<svg width="760" height="520" viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenAI 与 Anthropic 的 Harness 收敛</title>
  <desc id="desc">OpenAI 偏平台化、编排化、反馈闭环；Anthropic 偏运行时解耦、长任务交接、安全边界，二者共同收敛到工程控制系统。</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker><style>.title{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.h{font:700 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.t{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.box{stroke:#111827;stroke-width:1.4}.line{stroke:#111827;stroke-width:2;marker-end:url(#arrow)}</style></defs>
  <rect width="760" height="520" fill="#fff"/>
  <text x="380" y="36" text-anchor="middle" class="title">OpenAI 与 Anthropic 的 Harness 收敛</text>
  <text x="380" y="60" text-anchor="middle" class="sub">两条路线侧重点不同，但都在把 Agent 放进工程控制系统</text>

  <rect x="55" y="100" width="275" height="245" rx="20" fill="#EEF2FF" class="box"/>
  <text x="192" y="132" text-anchor="middle" class="h">OpenAI 公开实践观察</text>
  <text x="192" y="168" text-anchor="middle" class="t">Codex Harness / App Server</text>
  <text x="192" y="196" text-anchor="middle" class="t">Agent-first Codebase</text>
  <text x="192" y="224" text-anchor="middle" class="t">Symphony Orchestration</text>
  <text x="192" y="252" text-anchor="middle" class="t">Self-improving Loop</text>
  <text x="192" y="280" text-anchor="middle" class="t">Sandbox / Approval</text>
  <rect x="92" y="305" width="200" height="26" rx="9" fill="#DBEAFE"/>
  <text x="192" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">平台化 · 编排化 · 生产闭环</text>

  <rect x="430" y="100" width="275" height="245" rx="20" fill="#ECFDF5" class="box"/>
  <text x="568" y="132" text-anchor="middle" class="h">Anthropic 公开实践观察</text>
  <text x="568" y="168" text-anchor="middle" class="t">Effective Context Engineering</text>
  <text x="568" y="196" text-anchor="middle" class="t">Long-running Agents</text>
  <text x="568" y="224" text-anchor="middle" class="t">Planner / Generator / Evaluator</text>
  <text x="568" y="252" text-anchor="middle" class="t">Managed Agents</text>
  <text x="568" y="280" text-anchor="middle" class="t">Auto Mode / Containment</text>
  <rect x="468" y="305" width="200" height="26" rx="9" fill="#D1FAE5"/>
  <text x="568" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">运行时 · 长任务 · 安全边界</text>

  <rect x="155" y="415" width="450" height="64" rx="20" fill="#111827"/>
  <text x="380" y="441" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">共同方向</text>
  <text x="380" y="465" text-anchor="middle" font-size="13" fill="#D1D5DB">Agent 可运行、可编排、可验证、可恢复、可约束</text>
  <line x1="250" y1="345" x2="330" y2="415" class="line"/><line x1="510" y1="345" x2="430" y2="415" class="line"/>
</svg>
