  <rect x="60" y="80" width="280" height="300" rx="18" fill="#EEF2FF" stroke="#111827" stroke-width="1.5"/>
  <text x="200" y="115" text-anchor="middle" font-size="18" font-weight="700">OpenAI 路线</text>
  <text x="200" y="155" text-anchor="middle" font-size="13">Codex Harness</text>
  <text x="200" y="185" text-anchor="middle" font-size="13">App Server / Codex Core</text>
  <text x="200" y="215" text-anchor="middle" font-size="13">Agent-first Codebase</text>
  <text x="200" y="245" text-anchor="middle" font-size="13">Symphony Orchestration</text>
  <text x="200" y="275" text-anchor="middle" font-size="13">Self-improving Loop</text>
  <text x="200" y="305" text-anchor="middle" font-size="13">Sandbox / Approval</text>
