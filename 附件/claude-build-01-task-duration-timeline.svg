<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Claude 可完成任务时长时间轴</title>
  <desc id="desc">展示 Claude 可持续处理任务时长从分钟级进入小时级的变化趋势。</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.sub{font:400 22px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#475569}.label{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}.muted{font:400 20px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#475569}.time{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#2563eb}.duration{font:800 31px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#059669}.callout{font:700 26px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;fill:#0f172a}
    </style>
  </defs>
  <rect class="bg" width="1200" height="640" rx="28"/>
  <text class="title" x="70" y="68">Claude 可完成任务时长时间轴</text>
  <text class="sub" x="70" y="106">从分钟级任务，到可连续处理十几个小时的复杂研发任务</text>

  <line x1="130" y1="335" x2="1045" y2="335" stroke="#2563eb" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="130" y1="335" x2="130" y2="350" stroke="#2563eb" stroke-width="4"/>
  <line x1="405" y1="335" x2="405" y2="350" stroke="#2563eb" stroke-width="4"/>
  <line x1="680" y1="335" x2="680" y2="350" stroke="#2563eb" stroke-width="4"/>
  <line x1="955" y1="335" x2="955" y2="350" stroke="#2563eb" stroke-width="4"/>

  <circle cx="130" cy="335" r="17" fill="#ffffff" stroke="#2563eb" stroke-width="6"/>
  <circle cx="405" cy="335" r="22" fill="#ffffff" stroke="#2563eb" stroke-width="6"/>
  <circle cx="680" cy="335" r="27" fill="#ffffff" stroke="#2563eb" stroke-width="6"/>
  <circle cx="955" cy="335" r="32" fill="#ffffff" stroke="#7c3aed" stroke-width="7"/>

  <rect class="card" x="55" y="170" width="230" height="128" rx="18"/>
  <text class="time" x="84" y="213">2024.03</text>
  <text class="label" x="84" y="250">Claude Opus 3</text>
  <text class="duration" x="84" y="284">约 4 分钟</text>

  <rect class="card" x="310" y="382" width="245" height="138" rx="18"/>
  <text class="time" x="340" y="425">2025.03</text>
  <text class="label" x="340" y="462">Claude Sonnet 3.7</text>
  <text class="duration" x="340" y="498">约 1.5 小时</text>

  <rect class="card" x="585" y="160" width="250" height="138" rx="18"/>
  <text class="time" x="615" y="203">2026</text>
  <text class="label" x="615" y="240">Claude Opus 4.6</text>
  <text class="duration" x="615" y="276">约 12 小时</text>

  <rect class="card" x="850" y="382" width="290" height="138" rx="18" stroke="#7c3aed"/>
  <text class="time" x="880" y="425" fill="#7c3aed">2026</text>
  <text class="label" x="880" y="462">Claude Mythos Preview</text>
  <text class="duration" x="880" y="498">至少 16 小时</text>

  <path d="M130 298 L130 318" stroke="#cbd5e1" stroke-width="3"/>
  <path d="M405 382 L405 355" stroke="#cbd5e1" stroke-width="3"/>
  <path d="M680 298 L680 318" stroke="#cbd5e1" stroke-width="3"/>
  <path d="M955 382 L955 360" stroke="#cbd5e1" stroke-width="3"/>

  <rect x="140" y="555" width="920" height="54" rx="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="callout" x="205" y="591">AI 可持续处理的任务时长正在从分钟级进入小时级。</text>
</svg>
