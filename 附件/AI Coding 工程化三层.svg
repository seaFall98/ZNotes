<svg width="760" height="420" viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Coding 工程化三层</title>
  <desc id="desc">Prompt、Context、Harness 三层从任务表达、事实供应到工程闭环的递进关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
    <style>
      .title{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.h{font:700 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.t{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#374151}.small{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.box{stroke:#111827;stroke-width:1.5}.line{stroke:#111827;stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="760" height="420" fill="#ffffff"/>
  <text x="380" y="38" text-anchor="middle" class="title">AI Coding 工程化三层</text>
  <text x="380" y="62" text-anchor="middle" class="sub">从“让 AI 写”到“让 AI 可靠交付”，问题逐层上移</text>

  <rect x="50" y="105" width="190" height="122" rx="18" fill="#EEF2FF" class="box"/>
  <text x="145" y="138" text-anchor="middle" class="h">Prompt</text>
  <text x="145" y="166" text-anchor="middle" class="t">把模糊需求</text>
  <text x="145" y="187" text-anchor="middle" class="t">变成任务协议</text>
  <text x="145" y="212" text-anchor="middle" class="small">解决：要做什么</text>

  <rect x="285" y="105" width="190" height="122" rx="18" fill="#ECFDF5" class="box"/>
  <text x="380" y="138" text-anchor="middle" class="h">Context</text>
  <text x="380" y="166" text-anchor="middle" class="t">把项目事实</text>
  <text x="380" y="187" text-anchor="middle" class="t">变成可用上下文</text>
  <text x="380" y="212" text-anchor="middle" class="small">解决：看什么材料</text>

  <rect x="520" y="105" width="190" height="122" rx="18" fill="#F3F4F6" class="box"/>
  <text x="615" y="138" text-anchor="middle" class="h">Harness</text>
  <text x="615" y="166" text-anchor="middle" class="t">把 AI 工作</text>
  <text x="615" y="187" text-anchor="middle" class="t">变成工程闭环</text>
  <text x="615" y="212" text-anchor="middle" class="small">解决：做没做成</text>

  <line x1="240" y1="166" x2="285" y2="166" class="line"/>
  <line x1="475" y1="166" x2="520" y2="166" class="line"/>

  <rect x="80" y="285" width="600" height="78" rx="20" fill="#111827"/>
  <text x="380" y="318" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">核心变化：代码生成不是交付，证据闭环才是交付</text>
  <text x="380" y="344" text-anchor="middle" font-size="13" fill="#D1D5DB">任务表达 → 事实供应 → 执行约束 → 验证反馈 → 状态恢复 → 复盘回归</text>
</svg>
