  <rect x="95" y="145" width="130" height="45" rx="12" fill="#E0F2FE" stroke="#111827"/>
  <text x="160" y="173" text-anchor="middle" font-size="14" font-weight="700">回归</text>

  <path d="M445 95 C535 110 585 125 600 145" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M620 190 C650 230 650 265 620 285" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M535 322 C495 355 455 370 445 375" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M315 375 C260 365 220 345 200 330" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M145 285 C115 240 120 205 145 190" fill="none" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
