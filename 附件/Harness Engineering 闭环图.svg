  <text x="380" y="260" text-anchor="middle" font-size="13" fill="#4B5563">不是一次性生成</text>
  <text x="380" y="280" text-anchor="middle" font-size="13" fill="#4B5563">而是持续工程循环</text>

  <rect x="315" y="70" width="130" height="45" rx="12" fill="#EEF2FF" stroke="#111827"/>
  <text x="380" y="98" text-anchor="middle" font-size="14" font-weight="700">计划</text>

