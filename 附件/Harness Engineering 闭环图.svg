<svg width="760" height="500" viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Harness Engineering 闭环图</title>
  <desc id="desc">Harness Engineering 的五类能力：任务入口、执行环境、验证反馈、状态恢复、复盘回归。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#111827"/></marker>
    <style>.title{font:700 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.sub{font:400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6B7280}.h{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}.t{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4B5563}.box{stroke:#111827;stroke-width:1.4}.line{fill:none;stroke:#111827;stroke-width:2;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="760" height="500" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" class="title">Harness Engineering：让 AI 工作进入工程闭环</text>
  <text x="380" y="60" text-anchor="middle" class="sub">不是让 AI 更聪明，而是让错误更容易被发现、限制和修复</text>

  <circle cx="380" cy="255" r="92" fill="#111827"/>
  <text x="380" y="244" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">Harness</text>
  <text x="380" y="272" text-anchor="middle" font-size="13" fill="#D1D5DB">可验证 · 可恢复 · 可约束</text>

  <rect x="300" y="90" width="160" height="64" rx="16" fill="#EEF2FF" class="box"/>
  <text x="380" y="116" text-anchor="middle" class="h">任务入口控制</text><text x="380" y="138" text-anchor="middle" class="t">spec · 边界 · 验收</text>
  <rect x="535" y="190" width="160" height="64" rx="16" fill="#ECFDF5" class="box"/>
  <text x="615" y="216" text-anchor="middle" class="h">执行环境控制</text><text x="615" y="238" text-anchor="middle" class="t">sandbox · 权限 · 工具</text>
  <rect x="480" y="365" width="170" height="64" rx="16" fill="#F3F4F6" class="box"/>
  <text x="565" y="391" text-anchor="middle" class="h">验证反馈控制</text><text x="565" y="413" text-anchor="middle" class="t">test · CI · eval · logs</text>
  <rect x="110" y="365" width="170" height="64" rx="16" fill="#FEF3C7" class="box"/>
  <text x="195" y="391" text-anchor="middle" class="h">状态恢复控制</text><text x="195" y="413" text-anchor="middle" class="t">progress · git · handoff</text>
  <rect x="65" y="190" width="170" height="64" rx="16" fill="#FEE2E2" class="box"/>
  <text x="150" y="216" text-anchor="middle" class="h">复盘回归控制</text><text x="150" y="238" text-anchor="middle" class="t">checklist · 规则沉淀</text>

  <path d="M380 154 C470 160 560 170 600 190" class="line"/>
  <path d="M628 254 C655 315 625 345 580 365" class="line"/>
  <path d="M480 405 C400 445 300 435 275 410" class="line"/>
  <path d="M180 365 C110 330 105 280 135 254" class="line"/>
  <path d="M180 190 C220 140 265 125 300 120" class="line"/>

  <text x="380" y="470" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">规则进入流程，流程产生证据，证据驱动下一轮改进</text>
</svg>
